<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificando Pago - IVAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2d3c45; /* Dark navy/slate from logo */
            --secondary-color: #c87a4b; /* Copper/orange from logo */
            --bg-light: #F5F7FA;
            --text-dark: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .loading-container {
            background-color: white;
            border-radius: 16px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .spinner-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary-color);
            animation: spin 1s linear infinite;
        }

        .spinner-icon {
            font-size: 2rem;
            color: var(--primary-color);
            animation: pulseIcon 1.5s ease-in-out infinite;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: var(--primary-color);
        }

        p {
            color: #666;
            line-height: 1.6;
            margin: 0;
        }

        .dots::after {
            content: '';
            animation: ellipsis 1.5s infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes ellipsis {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <div class="spinner-wrapper">
            <div class="spinner-circle"></div>
            <i class="fas fa-lock spinner-icon"></i>
        </div>
        <h1>Verificando tu pago</h1>
        <p>Por favor espera un momento, estamos procesando tu transacción de forma segura con Azul<span class="dots"></span></p>
    </div>

    <!-- Script to simulate verification and redirect (this is a placeholder, actual redirection comes from Azul) -->
    <script>
        // Simulando una verificación de 3 segundos antes de continuar
        setTimeout(() => {
            // En un flujo real, aquí el backend responde y te redirige a éxito o error.
            // Esto es solo para pruebas visuales si abres la página directamente.
        }, 3000);
    </script>
</body>
</html>
