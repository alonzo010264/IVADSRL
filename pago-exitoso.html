<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso - IVAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2d3c45; /* Dark navy/slate from logo */
            --secondary-color: #c87a4b; /* Copper/orange from logo */
            --accent-color: #c87a4b;
            --bg-light: #F5F7FA;
            --text-dark: #333;
            --success-color: #2e7d32;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .success-container {
            background-color: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0; /* Starts hidden for animation */
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background-color: rgba(45, 60, 69, 0.1);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 24px;
            animation: pulseGreen 2s infinite ease-in-out;
            position: relative;
        }

        .success-icon::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            animation: ripple 2s infinite;
        }

        @keyframes pulseGreen {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: var(--primary-color);
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .order-details {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            color: #718096;
            font-weight: 500;
        }

        .detail-value {
            font-weight: 600;
            color: var(--primary-color);
        }

        .btn-home {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1>¡Pago completado con éxito!</h1>
        <p>Tu pedido ha sido procesado correctamente. Recibirás un correo electrónico de confirmación con los detalles de tu compra.</p>
        
        <div class="order-details">
            <div class="detail-row">
                <span class="detail-label">Estado:</span>
                <span class="detail-value" style="color: var(--success-color);">Aprobado</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Método de pago:</span>
                <span class="detail-value">Azul (Tarjeta)</span>
            </div>
        </div>

        <a href="desechables.html" class="btn-home"><i class="fas fa-shopping-cart" style="margin-right: 8px;"></i> Volver a la tienda</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orderDataStr = localStorage.getItem('ivad_last_order');
            if (orderDataStr) {
                try {
                    const order = JSON.parse(orderDataStr);
                    const detailsContainer = document.querySelector('.order-details');
                    
                    const orderId = order.id ? (order.id.substring(0, 8).toUpperCase()) : 'N/A';
                    const totalFormatted = order.total_amount ? `RD$ ${Number(order.total_amount).toLocaleString('es-DO', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : 'N/A';
                    
                    let itemsHtml = '';
                    if (order.items && order.items.length > 0) {
                        itemsHtml = `
                            <div style="margin-top: 15px; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
                                <h4 style="margin: 0 0 10px 0; color: var(--primary-color); font-size: 0.95rem; font-weight: 700;">Productos comprados:</h4>
                                ${order.items.map(item => `
                                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem;">
                                        <div style="display: flex; align-items: center; gap: 10px; text-align: left;">
                                            <img src="${item.img}" alt="${item.title}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid #eee;">
                                            <span style="color: #4a5568; font-weight: 500;">${item.title} <span style="color: #a0aec0; font-size: 0.8rem;">(x${item.qty})</span></span>
                                        </div>
                                        <span style="font-weight: 600; color: var(--primary-color);">RD$ ${(Number(item.price) * item.qty).toFixed(2)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }

                    detailsContainer.innerHTML = `
                        <div class="detail-row">
                            <span class="detail-label">No. Pedido:</span>
                            <span class="detail-value">#${orderId}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Cliente:</span>
                            <span class="detail-value">${order.client_name || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Método de pago:</span>
                            <span class="detail-value">${order.card_info || 'Azul (Tarjeta)'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Estado:</span>
                            <span class="detail-value" style="color: var(--success-color);">Aprobado</span>
                        </div>
                        <div class="detail-row" style="margin-top: 10px; border-top: 1px solid #e2e8f0; padding-top: 10px;">
                            <span class="detail-label" style="font-size: 1.1rem; font-weight: bold; color: var(--primary-color);">Total:</span>
                            <span class="detail-value" style="font-size: 1.1rem; font-weight: bold; color: var(--success-color);">${totalFormatted}</span>
                        </div>
                        ${itemsHtml}
                    `;
                } catch (err) {
                    console.error('Error parsing order data in success page:', err);
                }
            }
        });
    </script>
</body>
</html>
