<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso - IVAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2F3B4E;
            --secondary-color: #4A90D9;
            --accent-color: #D4AF37;
            --bg-light: #F5F7FA;
            --text-dark: #333;
            --success-color: #2e7d32;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .success-container {
            background-color: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0; /* Starts hidden for animation */
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #e8f5e9;
            color: var(--success-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 24px;
            animation: pulseGreen 2s infinite ease-in-out;
            position: relative;
        }

        .success-icon::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px solid var(--success-color);
            animation: ripple 2s infinite;
        }

        @keyframes pulseGreen {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: var(--primary-color);
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .order-details {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            color: #718096;
            font-weight: 500;
        }

        .detail-value {
            font-weight: 600;
            color: var(--primary-color);
        }

        .btn-home {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1>¡Pago completado con éxito!</h1>
        <p>Tu pedido ha sido procesado correctamente. Recibirás un correo electrónico de confirmación con los detalles de tu compra.</p>
        
        <div class="order-details">
            <div class="detail-row">
                <span class="detail-label">Estado:</span>
                <span class="detail-value" style="color: var(--success-color);">Aprobado</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Método de pago:</span>
                <span class="detail-value">Azul (Tarjeta)</span>
            </div>
            <!-- More order details could be populated here dynamically via URL params or local storage -->
        </div>

        <a href="desechables" class="btn-home"><i class="fas fa-shopping-cart" style="margin-right: 8px;"></i> Volver a la tienda</a>
    </div>

</body>
</html>
