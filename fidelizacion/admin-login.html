<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo - IVAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0d11;
            --card-dark: #12161c;
            --accent-gold: #bfa687;
            --accent-gold-hover: #a8906f;
            --text-light: #f7fafc;
            --text-muted: #8a9ba8;
            --border-color: #1f2530;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            width: 100%;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        /* Animated grid background for admin */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(191, 166, 135, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(191, 166, 135, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: 0;
        }

        /* Decorative Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.12;
            animation: floatOrb 10s ease-in-out infinite alternate;
        }

        @keyframes floatOrb {
            from { transform: translate(0, 0); }
            to { transform: translate(30px, 30px); }
        }

        .orb-1 {
            top: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background-color: #2b4560;
        }

        .orb-2 {
            bottom: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background-color: var(--accent-gold);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            background: rgba(18, 22, 28, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 45px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            z-index: 10;
            text-align: center;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #12161c, var(--accent-gold), #12161c);
            border-radius: 20px 20px 0 0;
        }

        .logo-wrap {
            margin-bottom: 35px;
        }

        .logo-wrap .icon-shield {
            font-size: 3rem;
            color: var(--accent-gold);
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(191, 166, 135, 0.3);
            animation: pulseShield 2s infinite alternate;
        }

        @keyframes pulseShield {
            from { transform: scale(1); filter: drop-shadow(0 0 5px rgba(191, 166, 135, 0.2)); }
            to { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(191, 166, 135, 0.5)); }
        }

        .logo-wrap h2 {
            font-size: 1.25rem;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .logo-wrap p {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            transition: color 0.3s;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(10, 13, 17, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrap input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(191, 166, 135, 0.2);
            background: rgba(10, 13, 17, 0.95);
        }

        .input-wrap input:focus + i {
            color: var(--accent-gold);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-gold);
            color: #121417;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(191, 166, 135, 0.15);
        }

        .btn-submit:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-1.5px);
            box-shadow: 0 6px 20px rgba(191, 166, 135, 0.25);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-box {
            background: rgba(192, 57, 43, 0.15);
            border: 1px solid rgba(192, 57, 43, 0.3);
            color: #e74c3c;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            text-align: left;
        }

        .client-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            font-size: 0.78rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.25s;
        }

        .client-link:hover {
            color: var(--accent-gold);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                border-radius: 16px;
            }
            .logo-wrap .icon-shield {
                font-size: 2.5rem;
                margin-bottom: 10px;
            }
            .logo-wrap h2 {
                font-size: 1.15rem;
            }
            body {
                padding: 20px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-container">
        
        <div class="logo-wrap">
            <i class="fas fa-shield-halved icon-shield"></i>
            <h2>Acceso al Panel</h2>
            <p>Portal Administrativo de IVAD</p>
        </div>

        <div class="error-box" id="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="error-text">Contraseña administrativa incorrecta.</span>
        </div>

        <form id="admin-form" onsubmit="handleAdminLogin(event)">
            <div class="form-group">
                <label for="admin-pass">Contraseña de Administrador</label>
                <div class="input-wrap">
                    <input type="password" id="admin-pass" placeholder="••••••••" required>
                    <i class="fas fa-key"></i>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="admin-btn-text">Ingresar al Panel</button>
        </form>

        <a href="index.html" class="client-link">
            <i class="fas fa-arrow-left"></i> Acceso para Clientes
        </a>
    </div>

    <script>
        function showError(msg) {
            const errBox = document.getElementById('error-message');
            const errText = document.getElementById('error-text');
            errText.textContent = msg;
            errBox.style.display = 'flex';
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            document.getElementById('error-message').style.display = 'none';

            const pass = document.getElementById('admin-pass').value.trim();
            const btn = document.getElementById('admin-btn-text');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = 'Ingresar al Panel';

                if (pass === 'adminivad1996') {
                    localStorage.setItem('ivad_loyalty_admin', 'true');
                    window.location.href = 'admin.html';
                } else {
                    showError('Contraseña administrativa incorrecta.');
                }
            }, 600);
        }
    </script>
</body>
</html>
