<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.12" />
    </filter>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#f8f8f8" />
      <stop offset="100%" stop-color="#eaeaea" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eaeaea" />
      <stop offset="60%" stop-color="#dfdfdf" />
      <stop offset="100%" stop-color="#cccccc" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="#fcfcfc" rx="12"/>
  
  <g filter="url(#shadow)" transform="translate(0, 10)">
    <!-- Base Tray (Cuerpo inferior) -->
    <path d="M45,85 L155,85 L145,130 C143,136 137,140 130,140 L70,140 C63,140 57,136 55,130 Z" fill="url(#bodyGrad)" stroke="#cccccc" stroke-width="1" />
    
    <!-- Bisagra / Borde del medio -->
    <path d="M38,82 C38,80 40,78 43,78 L157,78 C160,78 162,80 162,82 L162,86 C162,88 160,90 157,90 L43,90 C40,90 38,88 38,86 Z" fill="#eaeaea" stroke="#d5d5d5" stroke-width="1" />
    
    <!-- Tapa superior (Lid) -->
    <path d="M45,78 L55,42 C57,38 62,35 68,35 L132,35 C138,35 143,38 145,42 L155,78 Z" fill="url(#lidGrad)" stroke="#e2e2e2" stroke-width="1" />
    
    <!-- Relieve en la tapa (Lid Design Details) -->
    <path d="M60,70 L67,45 C68,43 71,42 74,42 L126,42 C129,42 132,43 133,45 L140,70 Z" fill="none" stroke="#e5e5e5" stroke-width="2" />
    
    <!-- Cierre frontal (Locking tab) -->
    <rect x="90" y="80" width="20" height="12" rx="3" fill="#ffffff" stroke="#cccccc" stroke-width="1" />
    <line x1="93" y1="86" x2="107" y2="86" stroke="#bfa687" stroke-width="2" />
  </g>
</svg>
