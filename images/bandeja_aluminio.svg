<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.18" />
    </filter>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b0b5bc" />
      <stop offset="20%" stop-color="#e9ecf0" />
      <stop offset="40%" stop-color="#9ea3a9" />
      <stop offset="60%" stop-color="#ffffff" />
      <stop offset="80%" stop-color="#cfd2d6" />
      <stop offset="100%" stop-color="#8a8e94" />
    </linearGradient>
    <linearGradient id="metalFloor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a8e94" />
      <stop offset="50%" stop-color="#cfd2d6" />
      <stop offset="100%" stop-color="#73767c" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="#fcfcfc" rx="12"/>
  
  <g filter="url(#shadow)" transform="translate(0, 5)">
    <!-- Outer aluminum tray body -->
    <path d="M22,52 L178,52 L163,142 L37,142 Z" fill="url(#metalGrad)" stroke="#7e8288" stroke-width="0.5" />
    
    <!-- Outer rim fold (Borde enrollado característico) -->
    <path d="M20,52 C20,49 23,47 26,47 L174,47 C177,47 180,49 180,52 C180,55 177,57 174,57 L26,57 C23,57 20,55 20,52 Z" fill="url(#metalGrad)" stroke="#73767c" stroke-width="0.5" />
    
    <!-- Inner floor of tray -->
    <path d="M36,65 L164,65 L151,131 L49,131 Z" fill="url(#metalFloor)" stroke="#696c71" stroke-width="0.5" />
    
    <!-- Corrugated wall segments (Pliegues del molde) -->
    <line x1="33" y1="57" x2="46" y2="131" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <line x1="35" y1="57" x2="48" y2="131" stroke="#505256" stroke-width="1" opacity="0.3" />
    
    <line x1="53" y1="57" x2="61" y2="131" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <line x1="55" y1="57" x2="63" y2="131" stroke="#505256" stroke-width="1" opacity="0.3" />
    
    <line x1="73" y1="57" x2="76" y2="131" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <line x1="75" y1="57" x2="78" y2="131" stroke="#505256" stroke-width="1" opacity="0.3" />
    
    <line x1="93" y1="57" x2="91" y2="131" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <line x1="95" y1="57" x2="93" y2="131" stroke="#505256" stroke-width="1" opacity="0.3" />
    
    <line x1="113" y1="57" x2="106" y2="131" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <line x1="115" y1="57" x2="108" y2="131" stroke="#505256" stroke-width="1" opacity="0.3" />
    
    <line x1="133" y1="57" x2="121" y2="131" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <line x1="135" y1="57" x2="123" y2="131" stroke="#505256" stroke-width="1" opacity="0.3" />
    
    <line x1="153" y1="57" x2="136" y2="131" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <line x1="155" y1="57" x2="138" y2="131" stroke="#505256" stroke-width="1" opacity="0.3" />
    
    <line x1="173" y1="57" x2="151" y2="131" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <line x1="175" y1="57" x2="153" y2="131" stroke="#505256" stroke-width="1" opacity="0.3" />
    
    <!-- Bottom concentric rectangles of tray base (Relieves del fondo) -->
    <rect x="58" y="75" width="84" height="42" rx="4" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.25" />
    <rect x="68" y="83" width="64" height="26" rx="2" stroke="#505256" stroke-width="1.5" fill="none" opacity="0.3" />
  </g>
</svg>
