<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <linearGradient id="kraftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dfc09f" />
      <stop offset="50%" stop-color="#cca781" />
      <stop offset="100%" stop-color="#bfa687" />
    </linearGradient>
    <linearGradient id="kraftInnerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cca781" />
      <stop offset="100%" stop-color="#b28e67" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="#fcfcfc" rx="12"/>
  
  <g filter="url(#shadow)" transform="translate(0, 5)">
    <!-- Outer rim / edge of the cardboard tray -->
    <path d="M25,55 L175,55 L160,135 L40,135 Z" fill="url(#kraftGrad)" stroke="#b8936d" stroke-width="0.5" />
    
    <!-- Inner floor of the cardboard tray (Depression) -->
    <path d="M38,65 L162,65 L150,125 L50,125 Z" fill="url(#kraftInnerGrad)" stroke="#a37c56" stroke-width="0.5" />
    
    <!-- Structural folds on the corners (Pliegues reforzados) -->
    <line x1="25" y1="55" x2="38" y2="65" stroke="#a37c56" stroke-width="1.5" />
    <line x1="175" y1="55" x2="162" y2="65" stroke="#a37c56" stroke-width="1.5" />
    <line x1="160" y1="135" x2="150" y2="125" stroke="#a37c56" stroke-width="1.5" />
    <line x1="40" y1="135" x2="50" y2="125" stroke="#a37c56" stroke-width="1.5" />
    
    <!-- Texture details / highlights -->
    <path d="M38,65 L162,65" stroke="#ffffff" stroke-width="1" opacity="0.15" />
    <path d="M50,125 L150,125" stroke="#000000" stroke-width="1" opacity="0.1" />
  </g>
</svg>
