<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.1" />
    </filter>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#fdfdfd" />
      <stop offset="100%" stop-color="#e2e2e2" />
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefefe" />
      <stop offset="100%" stop-color="#d5d5d5" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="#fcfcfc" rx="12"/>
  
  <g filter="url(#shadow)" transform="translate(0, 0)">
    <!-- Outer Rim -->
    <circle cx="100" cy="100" r="75" fill="url(#plateGrad)" stroke="#dddddd" stroke-width="0.5" />
    
    <!-- Ribbed details on the plate rim (Borde estriado del plato de cartón) -->
    <circle cx="100" cy="100" r="71" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.6" />
    
    <!-- Base Plate Wall (Inicio del fondo del plato) -->
    <circle cx="100" cy="100" r="60" fill="url(#rimGrad)" stroke="#cccccc" stroke-width="0.5" />
    
    <!-- Compartment Bases (Fondo de las divisiones) -->
    <circle cx="100" cy="100" r="58" fill="#ffffff" />
    
    <!-- Divider Walls (Paredes divisorias con relieve 3D) -->
    <!-- Divider Left-Bottom to center -->
    <path d="M100,100 L50,130 M100,100 L150,130 M100,100 L100,42" stroke="#e0e0e0" stroke-width="5" stroke-linecap="round" />
    <path d="M100,100 L50,130 M100,100 L150,130 M100,100 L100,42" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    
    <!-- Internal Compartments Shadow Overlay -->
    <circle cx="100" cy="100" r="58" fill="none" stroke="#000000" stroke-width="3" opacity="0.05" />
  </g>
</svg>
